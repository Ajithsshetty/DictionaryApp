<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary-App</title>
    <style>
   body {
    display: grid;
    text-align: center;
    justify-content: center;
    place-items: center;
    height: 100vh;
    background-color: aqua;
   }
.card {
    width: auto;
    background-color: black;
    padding: 3rem 2rem;
    border-radius: 1rem;
    box-shadow: 0 0 ,5rem rgba(0, 0, 0, 0);
}
.property {
    color:cornflowerblue;
    display: flex;
    align-items: flex-start;
    margin: 1rem;
    column-gap: 1rem;
}
.search-form {
    margin-bottom: 1rem;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    width: 30vw;
    height: 10vh;
    background-color: black;
    padding: 10px 10px;
    
}
.search-form input,.search-form button {
    flex-basis: 70%;
    font-size: 1rem;
    padding: 2px 2px;
    border: 1px solid red;
    outline: none;
    background-color: transparent;
    color: white;
    
}

.search-form button {
    flex-basis: 30%;
    border-radius: 5px;
    margin-top: 5px;
    cursor: pointer;
   
}

.search-form button:hover {
    background-color: white;
    color: black;
}





</style>
</head>
<body>
<div class="container">
    <div class="search-form">
        <input type="text" placeholder="Search Something">
        <button>Search</button>
    </div>

    <div class="dictionary-app">
        <div class="card">
            <div class="property">
                <span>Word :- </span>
                <span>Word name Defination</span>
            </div>

            <div class="property">
                <span>Phonetics :- </span>
                 <span>Phonetics of the Word Defination </span>
            </div>

            <div class="property">
                <span>Audio :- </span>
            </div>

            <div class="property">
                <span>Definition :- </span>
                 <span>Definition meaning </span>
            </div>

            <div class="property">
                <span>Example :- </span>
            </div>

            <div class="property">
                <span>Prat of Speech :- </span>
            </div>
         
        </div>
    </div>

</div>
</body>
<script src="dictionary-app.js"></script>
</html>
